<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Better Life Medical - Login</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="portal.css"/>
</head>
<body class="portal-body" data-page="login">
  <main class="auth-shell">
    <section class="auth-panel">
      <aside class="auth-aside">
        <div class="auth-kicker">Staff Portal</div>
        <h1>Better Life Medical DWO Workspace</h1>
        <p>Sign in to access forms, saved records, and your staff profile.</p>
      </aside>

      <section class="auth-main">
        <div class="auth-main-header">
          <h2>Sign in</h2>
          <p>Use your verified Better Life Medical account to continue.</p>
        </div>

        <div class="portal-form">
          <div class="portal-field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="name@company.com" autocomplete="username"/>
          </div>
          <div class="portal-field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
          </div>
          <label class="portal-check" for="login-remember">
            <input id="login-remember" type="checkbox" checked/>
            Remember login on this device
          </label>
        </div>

        <div class="portal-actions">
          <button class="btn btn-stamp" type="button" onclick="portalSignIn()">Sign In</button>
        </div>

        <div class="portal-status" id="login-status">Enter your email and password to continue.</div>

        <div class="auth-switch">
          Don't have an account? <a class="portal-link" href="signup.html">Sign Up</a>
        </div>
      </section>
    </section>
  </main>

  <script src="portal.js"></script>
</body>
</html>
